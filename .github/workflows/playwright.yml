name: Playwright & Allure Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Grants permissions required to deploy to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  automation-run:
    name: Headless Playwright Multi-browser Execution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Download Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Automation Suites
        run: npx playwright test
        continue-on-error: true # Prevents the pipeline from stopping so reports still build on failure

      # Step 6: Generate Single-File Allure Report
      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --single-file --clean -o allure-report-single

      # Step 7: Consolidate reports into a single deployment folder
      - name: Structure Reports for GitHub Pages
        if: always()
        run: |
          mkdir -p public-reports
          # Move Playwright HTML report folder
          [ -d playwright-report ] && cp -r playwright-report public-reports/playwright
          # Move Allure Single HTML file and name it index.html inside its folder
          mkdir -p public-reports/allure
          [ -f allure-report-single/index.html ] && cp allure-report-single/index.html public-reports/allure/index.html
          
          # Create a landing homepage index file so you can easily choose which report to look at
          cat <<EOF > public-reports/index.html
          <!DOCTYPE html>
          <html>
          <head><title>Test Execution Dashboards</title></head>
          <body style="font-family: sans-serif; padding: 40px; text-align: center;">
            <h1>🚀 Test Execution Reports</h1>
            <p>Select a report to view directly in your browser:</p>
            <div style="margin-top: 30px;">
              <a href="playwright/index.html" style="padding: 15px 25px; background: #2E6DF6; color: white; text-decoration: none; border-radius: 5px; margin: 10px; display: inline-block;">View Playwright HTML Report</a>
              <a href="allure/index.html" style="padding: 15px 25px; background: #42B983; color: white; text-decoration: none; border-radius: 5px; margin: 10px; display: inline-block;">View Allure Single-File Report</a>
            </div>
          </body>
          </html>
          EOF

      # Step 8: Deploy directly to GitHub Pages
      - name: Deploy Reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-reports