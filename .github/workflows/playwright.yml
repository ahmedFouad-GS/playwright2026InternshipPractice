name: Playwright & Allure Automation
on:  
  pull_request:    
    branches: [main]  
  push:    
    branches: [main]

permissions:
  pull-requests: write
  contents: write
  pages: write       # Required for deploying to GitHub Pages
  id-token: write    # Required for secure OIDC deployment

jobs:  
  test:    
    name: Headless Playwright Multi-browser Execution
    runs-on: ubuntu-latest    

    steps:      
      - name: Checkout code        
        uses: actions/checkout@v4      

      - name: Setup Node.js        
        uses: actions/setup-node@v4        
        with:          
          node-version: 24 # Upgraded from lts/* to match GitHub's Node 24 environments

      - name: Install dependencies        
        run: npm ci      

      - name: Install Playwright Browsers        
        run: npx playwright install --with-deps      

      - name: Run Playwright tests        
        timeout-minutes: 60        
        run: AUTO_ALLURE_OPEN=false npx playwright test
        continue-on-error: true # Allows script to proceed to reporting even if tests fail

      # Step 6: Generate the Single-File Allure Report
      - name: Generate Allure Single-File Report
        if: ${{ !cancelled() }}
        run: |
          npm install -g allure-commandline
          allure generate allure-results --single-file --clean -o allure-report

      # Step 7: Consolidate reports for secure web serving
      - name: Structure Reports for GitHub Pages
        if: ${{ !cancelled() }}
        run: |
          mkdir -p public-reports
          [ -d reports/playwright-report ] && cp -r reports/playwright-report public-reports/playwright || echo "Playwright HTML folder missing"
          mkdir -p public-reports/allure
          [ -f allure-report/index.html ] && cp allure-report/index.html public-reports/allure/index.html || echo "Allure index missing"

      # Step 8: Deploy to GitHub Pages (creates a live link instantly)
      - name: Deploy Reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ !cancelled() }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-reports

      # Step 9: Add lightweight links to the Summary page (Zero size penalty!)
      - name: Publish Live Dashboard Links to Actions Summary
        if: ${{ !cancelled() }}
        run: |
          echo "# 📊 Test Execution Dashboards" >> $GITHUB_STEP_SUMMARY
          echo "Reports deployed successfully! Click the links below to view the interactive web reports directly in your browser:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "* 🎭 [Open Playwright HTML Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/playwright/)" >> $GITHUB_STEP_SUMMARY
          echo "* 🚀 [Open Allure Interactive Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure/)" >> $GITHUB_STEP_SUMMARY

      # Standard Fallback Uploads
      - name: Upload Playwright report        
        uses: actions/upload-artifact@v4        
        if: ${{ !cancelled() }}        
        with:          
          name: playwright-report          
          path: reports/playwright-report/
          retention-days: 30      

      - name: Upload Allure report        
        uses: actions/upload-artifact@v4        
        if: ${{ !cancelled() }}        
        with:          
          name: allure-report          
          path: allure-report/
          retention-days: 30      

      - name: Post Playwright report summary        
        if: always()        
        uses: daun/playwright-report-summary@v3
        continue-on-error: true # Don't crash if your config misses the JSON reporter
        with:          
          report-file: reports/json-report/test-results.json      

      - name: Publish Test Report        
        uses: ctrf-io/github-test-reporter@v1
        continue-on-error: true # Don't crash if your config misses the CTRF reporter
        with:          
          report-path: 'ctrf/ctrf-report.json'          
          github-report: true        
        if: always()