on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  automation-run:
    name: Headless Playwright Multi-browser Execution
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull source code changes into target virtual environments
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Provision verified Node runtimes
      - name: Setup Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Automates global dependency caching

      # Step 3: Install pristine locked modules
      - name: Install Project Dependencies
        run: npm ci

      # Step 4: Provision Playwright OS runtime drivers and dependencies
      - name: Download Playwright Browsers
        run: npx playwright install --with-deps

      # Step 5: Trigger headless test executions
      - name: Run E2E Automation Suites
        run: npx playwright test

      # Step 6: Generate Single-File Allure Report
      - name: Generate Allure Report
        if: always() # Ensure reporting fires even if tests crash
        run: |
          npm install -g allure-commandline
          allure generate allure-results --single-file --clean -o allure-report-single

      # Step 7: Export reporting artifacts straight to Github workflow dashboards
      - name: Save Pipeline Reporting Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-and-allure-html-reports
          path: |
            playwright-report/
            allure-report-single/index.html
          retention-days: 14