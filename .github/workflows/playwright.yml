name: Playwright & Allure Automation
on:  
  pull_request:    
    branches: [main]  

jobs:  
  test:    
    name: Headless Playwright Multi-browser Execution
    runs-on: ubuntu-latest    
    permissions:      
      pull-requests: write      
      contents: write # Upgraded to write to allow writing to the job summary page

    steps:      
      - name: Checkout code        
        uses: actions/checkout@v4      

      - name: Setup Node.js        
        uses: actions/setup-node@v4        
        with:          
          node-version: lts/* - name: Install dependencies        
        run: npm ci      

      - name: Install Playwright Browsers        
        run: npx playwright install --with-deps      

      - name: Run Playwright tests        
        timeout-minutes: 60        
        run: AUTO_ALLURE_OPEN=false npx playwright test      

      # Step 6: Generate the Single-File Allure Report in CI
      - name: Generate Allure Single-File Report
        if: ${{ !cancelled() }}
        run: |
          npm install -g allure-commandline
          allure generate allure-results --single-file --clean -o allure-report

      # Step 7: Embed BOTH single-file HTML reports directly into the GitHub Actions Summary
      - name: Publish HTML Reports Directly to Actions Summary
        if: ${{ !cancelled() }}
        run: |
          echo "# 📊 Interactive Test Dashboards" >> $GITHUB_STEP_SUMMARY
          echo "You can view and interact with the full reports directly inside this summary panel by expanding the dropdowns below." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Inject Playwright Standalone HTML
          if [ -f reports/playwright-report/index.html ]; then
            echo "## 🎭 Playwright HTML Report" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>🔍 Click to expand and view the Playwright Report</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat reports/playwright-report/index.html >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Inject Allure Standalone HTML
          if [ -f allure-report/index.html ]; then
            echo "## 🚀 Allure HTML Report" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>🔍 Click to expand and view the Allure Report</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat allure-report/index.html >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Playwright report        
        uses: actions/upload-artifact@v4        
        if: ${{ !cancelled() }}        
        with:          
          name: playwright-report          
          path: reports/playwright-report/index.html          
          retention-days: 30      

      - name: Upload Allure report        
        uses: actions/upload-artifact@v4        
        if: ${{ !cancelled() }}        
        with:          
          name: allure-report          
          path: allure-report/index.html          
          retention-days: 30      

      - name: Post Playwright report summary        
        if: always()        
        uses: daun/playwright-report-summary@v3        
        with:          
          report-file: reports/json-report/test-results.json      

      - name: Publish Test Report        
        uses: ctrf-io/github-test-reporter@v1        
        with:          
          report-path: 'ctrf/ctrf-report.json'          
          github-report: true        
        if: always()