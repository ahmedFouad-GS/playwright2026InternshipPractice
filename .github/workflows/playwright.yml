name: Playwright & Allure Automation
on:  
  pull_request:    
    branches: [main]  
  push:    
    branches: [main]

permissions:
  pull-requests: write
  contents: write
  pages: write       # Required for official GitHub Pages engine
  id-token: write    # Required for secure OIDC deployment tokens

jobs:  
  test:    
    name: Headless Playwright Multi-browser Execution
    runs-on: ubuntu-latest    

    steps:      
      - name: Checkout code        
        uses: actions/checkout@v4      

      - name: Setup Node.js        
        uses: actions/setup-node@v4        
        with:          
          node-version: 24 

      - name: Install dependencies        
        run: npm ci      

      - name: Install Playwright Browsers        
        run: npx playwright install --with-deps      

      - name: Run Playwright tests        
        timeout-minutes: 60        
        run: AUTO_ALLURE_OPEN=false npx playwright test
        continue-on-error: true 

      # Step 6: Generate the Single-File Allure Report
      - name: Generate Allure Single-File Report
        if: ${{ !cancelled() }}
        run: |
          npm install -g allure-commandline
          allure generate allure-results --single-file --clean -o allure-report

      # Step 7: Structure for GitHub Pages (Allure at root, Playwright nested)
      - name: Structure Reports for GitHub Pages
        if: ${{ !cancelled() }}
        run: |
          mkdir -p public-reports/playwright
          
          # Copy Playwright HTML report into its nested directory
          [ -d reports/playwright-report ] && cp -r reports/playwright-report/* public-reports/playwright/ || echo "Playwright HTML folder missing"
          
          # Copy Allure Single-File report directly to the root index.html
          [ -f allure-report/index.html ] && cp allure-report/index.html public-reports/index.html || echo "Allure index missing"

      # Step 8: Package and Upload your static directory using official Pages actions
      - name: Upload Pages Artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public-reports

      # Step 9: Live deploy to Pages engine instantly
      - name: Deploy to GitHub Pages
        if: ${{ !cancelled() }}
        uses: actions/deploy-pages@v4

      # Step 10: Print direct web links to access the live reports
      - name: Publish Live Dashboard Links to Actions Summary
        if: ${{ !cancelled() }}
        run: |
          echo "# 📊 Live Test Execution Dashboards" >> $GITHUB_STEP_SUMMARY
          echo "Reports deployed successfully! Click below to open them directly in your browser:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "* 🚀 [Open Allure Interactive Report (Main Site)](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY
          echo "* 🎭 [Open Playwright HTML Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/playwright/index.html)" >> $GITHUB_STEP_SUMMARY

      # Standard Fallback Uploads (As downloadable zip backups)
      - name: Upload Playwright report archive
        uses: actions/upload-artifact@v4        
        if: ${{ !cancelled() }}        
        with:          
          name: playwright-report          
          path: reports/playwright-report/
          retention-days: 30      

      - name: Upload Allure report archive
        uses: actions/upload-artifact@v4        
        if: ${{ !cancelled() }}        
        with:          
          name: allure-report          
          path: allure-report/
          retention-days: 30